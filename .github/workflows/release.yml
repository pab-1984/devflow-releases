name: release

# PUBLIC releases-only repo. The source code lives in the private repo pab-1984/devflow.
# This workflow checks out the private code (read-only deploy key), builds it for the three
# platforms and publishes the Release + latest.json (auto-updater) here, in public.
#
# To publish a version: create the tag in BOTH repos with the same version.
#   1) in devflow (private):        git tag vX.Y.Z && git push origin vX.Y.Z
#   2) in devflow-releases (this):  git tag vX.Y.Z && git push origin vX.Y.Z   <- triggers this
#
# CODE SIGNING: the secrets below are empty until you set them. Until then, macOS/Windows builds
# ship unsigned/ad-hoc (Windows already degrades gracefully; macOS needed the extra "mac_sign" step
# below because tauri attempts codesign — and fails — even when APPLE_CERTIFICATE is merely an empty
# string, not unset; see tauri-apps/tauri-action#234). See docs/SIGNING.md in the private repo for
# how to obtain real certificates.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Ref of the code repo (devflow) to build (tag or branch)'
        default: 'master'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'   # Apple Silicon
            args: '--target aarch64-apple-darwin'
            triple: 'aarch64-apple-darwin'
          - platform: 'macos-latest'   # Intel
            args: '--target x86_64-apple-darwin'
            triple: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            triple: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: ''
            triple: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    env:
      # Updater signing (auto-generated, already configured)
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      # Windows code signing (Azure Trusted Signing). Empty => unsigned build.
      # Consumed by src-tauri/sign-windows.ps1 (signCommand) during bundling.
      TRUSTED_SIGNING_ENDPOINT: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
      TRUSTED_SIGNING_ACCOUNT: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
      TRUSTED_SIGNING_PROFILE: ${{ secrets.TRUSTED_SIGNING_PROFILE }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      # AppImage bundling needs to mount itself via FUSE, which GitHub's ubuntu-22.04 runners don't
      # have enabled — this makes linuxdeploy extract-and-run instead (no FUSE needed). Harmless on
      # the other platforms (unused there). See tauri-apps/tauri#14796.
      APPIMAGE_EXTRACT_AND_RUN: "1"
    steps:
      - name: checkout private code (devflow)
        uses: actions/checkout@v4
        with:
          repository: pab-1984/devflow
          ref: ${{ github.event.inputs.ref || github.ref_name }}
          ssh-key: ${{ secrets.CODE_REPO_SSH_KEY }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      # An empty APPLE_CERTIFICATE still makes tauri attempt codesign and fail (tauri-apps/tauri-action#234)
      # — the env vars must be omitted entirely, not just left empty, when no certificate is configured.
      - name: check macOS signing secrets
        id: mac_sign
        if: matrix.platform == 'macos-latest'
        run: |
          if [ -n "$CERT" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install Azure Trusted Signing CLI (Windows, only when configured)
        if: matrix.platform == 'windows-latest' && env.TRUSTED_SIGNING_ENDPOINT != ''
        run: cargo install trusted-signing-cli

      - name: install frontend dependencies
        run: npm ci

      # OpenCode ships as a bundled Tauri sidecar (no separate install for users) — this fetches the
      # native binary for the target being built right now (never committed, ~170MB/platform,
      # exceeds GitHub's 100MB limit). See scripts/fetch-opencode-sidecar.mjs in the private repo.
      - name: fetch OpenCode sidecar binary
        run: node scripts/fetch-opencode-sidecar.mjs ${{ matrix.triple }}

      # Unsigned/ad-hoc path: windows, linux, and macOS whenever no Apple certificate is configured.
      # --no-sign is the documented tauri CLI flag to skip codesigning outright (belt-and-suspenders
      # alongside omitting the APPLE_* env vars, which alone did not stop a codesign attempt from
      # still firing on macOS for reasons not fully understood — see the "why" note in the mac_sign
      # step). --verbose surfaces linuxdeploy's real output on Linux instead of a generic wrapper error.
      - uses: tauri-apps/tauri-action@v0
        if: matrix.platform != 'macos-latest' || steps.mac_sign.outputs.configured != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'DevFlow __VERSION__'
          releaseBody: 'Download the installer for your operating system from the assets below. The app auto-updates.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }} --no-sign --verbose

      # Signed path: macOS only, only when an Apple Developer certificate is actually configured.
      - uses: tauri-apps/tauri-action@v0
        if: matrix.platform == 'macos-latest' && steps.mac_sign.outputs.configured == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'DevFlow __VERSION__'
          releaseBody: 'Download the installer for your operating system from the assets below. The app auto-updates.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
